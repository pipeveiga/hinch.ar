name: Sincronizar eventos

on:
  schedule:
    # Cada 6 horas, en los minutos 15 (evita las horas en punto para no
    # colisionar con otros crons masivos)
    - cron: '15 */6 * * *'
  workflow_dispatch:
    # También se puede correr manualmente desde Actions → "Run workflow"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias y sincronizar
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TICKETMASTER_KEY:     ${{ secrets.TICKETMASTER_KEY }}
        run: |
          mkdir -p /tmp/sync-deps
          cp scripts/sync-events.mjs /tmp/sync-deps/
          cd /tmp/sync-deps
          npm init -y >/dev/null
          npm install @supabase/supabase-js
          node sync-events.mjs
