name: Sincronizar eventos

on:
  schedule:
    # Todos los lunes a las 9am (Argentina = UTC-3, entonces 12:00 UTC)
    - cron: '0 12 * * 1'
  workflow_dispatch:
    # También se puede correr manualmente desde GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          mkdir -p /tmp/sync-deps
          cd /tmp/sync-deps
          npm init -y
          npm install @supabase/supabase-js

      - name: Sincronizar eventos
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APIFOOTBALL_KEY:     ${{ secrets.APIFOOTBALL_KEY }}
          TICKETMASTER_KEY:    ${{ secrets.TICKETMASTER_KEY }}
          NODE_PATH:           /tmp/sync-deps/node_modules
        run: node scripts/sync-events.mjs
